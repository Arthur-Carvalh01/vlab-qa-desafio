version: '3.8'

services:
  cypress-tests:
    image: cypress/included:13.6.0
    container_name: vlab-qa-tests
    working_dir: /e2e
    volumes:
      - ./:/e2e
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CYPRESS_BASE_URL=http://host.docker.internal:3000
    command: npx cypress run